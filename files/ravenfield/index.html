<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Ravenfield</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #231F20; overflow: hidden; }
      #unity-container { position: fixed; inset: 0; width: 100vw; height: 100vh; }
      #unity-canvas { display: block; width: 100vw !important; height: 100vh !important; background: #231F20; outline: none; }
      #unity-loading-bar {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        display: none;
      }
      #unity-footer { display: none !important; }
      #unity-warning { position: fixed; left: 50%; top: 12px; transform: translateX(-50%); z-index: 10; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>
    <script>
      window.addEventListener("load", function () {
        alert("port is laggy especially on larger maps and bugs are to be expected");
      });
      (function () {
        var DATA_MARKER = "Build/WebGL.data";
        var PART_COUNT = 23;
        var PART_PREFIX = "Build/WebGL.data.part.";

        function fetchAllParts(baseUrl) {
          var origin = baseUrl.substring(0, baseUrl.lastIndexOf("Build/"));
          var urls = [];
          for (var i = 0; i < PART_COUNT; i++) {
            urls.push(origin + PART_PREFIX + String(i).padStart(3, "0"));
          }
          return Promise.all(urls.map(function (u) {
            return fetch(u).then(function (r) {
              if (!r.ok) throw new Error("Failed to fetch " + u + ": " + r.status);
              return r.arrayBuffer();
            });
          })).then(function (buffers) {
            var total = 0;
            buffers.forEach(function (b) { total += b.byteLength; });
            var out = new Uint8Array(total);
            var offset = 0;
            buffers.forEach(function (b) {
              out.set(new Uint8Array(b), offset);
              offset += b.byteLength;
            });
            return out.buffer;
          });
        }

        function isDataUrl(url) {
          if (!url) return false;
          return url.indexOf(DATA_MARKER) !== -1 && url.indexOf(".part.") === -1;
        }

        var origFetch = window.fetch ? window.fetch.bind(window) : null;
        if (origFetch) {
          window.fetch = function (input, init) {
            var url = (typeof input === "string") ? input : (input && input.url) || "";
            if (!isDataUrl(url)) return origFetch(input, init);
            return fetchAllParts(url).then(function (buf) {
              return new Response(buf, {
                status: 200,
                headers: { "Content-Type": "application/octet-stream", "Content-Length": String(buf.byteLength) }
              });
            });
          };
        }

        var XHR = window.XMLHttpRequest;
        var origOpen = XHR.prototype.open;
        var origSend = XHR.prototype.send;
        var origSetRH = XHR.prototype.setRequestHeader;
        XHR.prototype.open = function (method, url) {
          this.__url = url;
          this.__method = method;
          this.__intercept = (method.toUpperCase() === "GET") && isDataUrl(url);
          if (this.__intercept) {
            this.__listeners = { load: [], loadend: [], progress: [], error: [], abort: [], readystatechange: [] };
          }
          return origOpen.apply(this, arguments);
        };
        XHR.prototype.setRequestHeader = function () {
          if (this.__intercept) return;
          return origSetRH.apply(this, arguments);
        };
        var addEL = XHR.prototype.addEventListener;
        XHR.prototype.addEventListener = function (type, fn) {
          if (this.__intercept && this.__listeners[type]) {
            this.__listeners[type].push(fn);
            return;
          }
          return addEL.apply(this, arguments);
        };
        XHR.prototype.send = function () {
          if (!this.__intercept) return origSend.apply(this, arguments);
          var xhr = this;
          var fire = function (type, ev) {
            ev = ev || { type: type, target: xhr, currentTarget: xhr };
            var arr = (xhr.__listeners && xhr.__listeners[type]) || [];
            arr.forEach(function (fn) { try { fn.call(xhr, ev); } catch (e) { console.error(e); } });
            var on = xhr["on" + type];
            if (typeof on === "function") { try { on.call(xhr, ev); } catch (e) { console.error(e); } }
          };
          fetchAllParts(xhr.__url).then(function (buf) {
            Object.defineProperty(xhr, "readyState", { value: 4, configurable: true });
            Object.defineProperty(xhr, "status", { value: 200, configurable: true });
            Object.defineProperty(xhr, "statusText", { value: "OK", configurable: true });
            Object.defineProperty(xhr, "response", { value: buf, configurable: true });
            Object.defineProperty(xhr, "responseURL", { value: xhr.__url, configurable: true });
            try { Object.defineProperty(xhr, "responseType", { value: xhr.responseType || "arraybuffer", configurable: true }); } catch (e) {}
            fire("readystatechange");
            fire("progress", { type: "progress", target: xhr, currentTarget: xhr, lengthComputable: true, loaded: buf.byteLength, total: buf.byteLength });
            fire("load");
            fire("loadend");
          }).catch(function (err) {
            console.error("Split data load failed:", err);
            Object.defineProperty(xhr, "readyState", { value: 4, configurable: true });
            Object.defineProperty(xhr, "status", { value: 500, configurable: true });
            fire("error");
            fire("loadend");
          });
        };
      })();

      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px; color: #fff;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        dataUrl: buildUrl + "/WebGL.data",
        frameworkUrl: buildUrl + "/WebGL.framework.js",
        codeUrl: buildUrl + "/WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "SteelRaven7",
        productName: "RavenfieldSteam",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        config.devicePixelRatio = 1;
        unityShowBanner('WebGL builds are not supported on mobile devices.');
      }

      function resize() {
        var dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
      }
      resize();
      window.addEventListener("resize", resize);
      window.addEventListener("orientationchange", resize);

      canvas.addEventListener("click", function () { canvas.focus(); });

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          window.unityInstance = unityInstance;
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
